<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP 7 COFFEE - القائمة الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #f8fafc; color: #2d2d2d; direction: rtl; }
        .menu-header { position: relative; background-size: cover; background-position: center; text-align: center; padding: 65px 20px; color: white; transition: background-image 0.6s ease-in-out; }
        .menu-header .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.68); z-index: 1; }
        .header-content { position: relative; z-index: 2; }
        .restaurant-logo { font-size: 36px; background: white; width: 76px; height: 76px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto 12px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .header-content h1 { font-size: 30px; font-weight: 800; }
        .categories-bar { display: flex; gap: 8px; padding: 25px 16px 15px 16px; max-width: 500px; margin: 0 auto; overflow-x: auto; }
        .category-btn { padding: 11px 18px; border: 1px solid #e2e8f0; background-color: white; border-radius: 25px; font-weight: 700; cursor: pointer; white-space: nowrap; }
        .category-btn.active { background-color: #1e1b4b; color: white; }
        .menu-container { max-width: 500px; margin: 5px auto 100px auto; padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
        .menu-item { background-color: #ffffff; padding: 12px; border-radius: 18px; border: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .item-info { display: flex; align-items: center; gap: 14px; }
        .item-thumbnail { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: #eee; }
        .price-container { text-align: left; font-weight: 800; color: #b45309; }
    </style>
</head>
<body>

    <header class="menu-header" id="menuHeader" style="background-image: url('https://images.unsplash.com/photo-1447933601403-0c6688de566e?q=80&w=1000');">
        <div class="overlay"></div>
        <div class="header-content">
            <div class="restaurant-logo" id="restaurantLogo">☕</div>
            <h1 id="headerTitle">TOP 7 COFFEE</h1>
            <p id="headerSubtitle">أجود محاصيل القهوة والمشروبات</p>
        </div>
    </header>

    <div class="categories-bar">
        <button class="category-btn active" onclick="loadMenu('hot', this)">☕ الساخنة</button>
        <button class="category-btn" onclick="loadMenu('cold', this)">🧊 الباردة</button>
        <button class="category-btn" onclick="loadMenu('tea', this)">🍵 الشاي</button>
        <button class="category-btn" onclick="loadMenu('sweets', this)">🍰 الحلويات</button>
    </div>

    <main class="menu-container" id="menuItems"></main>

    <script>
        const data = {
            hot: [
                { name: 'اسبريسو', price: '6 ر.س' }, { name: 'كابتشينو', price: '10/8 ر.س' },
                { name: 'لاتيه', price: '10/8 ر.س' }, { name: 'فلات وايت', price: '9 ر.س' },
                { name: 'قهوة تركية', price: '8/5 ر.س' }, { name: 'هوت شوكليت', price: '10 ر.س' }
            ],
            cold: [
                { name: 'كودرد', price: '11 ر.س' }, { name: 'موهيتو', price: '8 ر.س' },
                { name: 'أيس لاتيه', price: '10 ر.س' }, { name: 'أيس أمريكانو', price: '9 ر.س' },
                { name: 'فرابيه', price: '12 ر.س' }, { name: 'ميلك شيك', price: '12 ر.س' }
            ],
            tea: [
                { name: 'شاي أحمر', price: '2 ر.س' }, { name: 'شاي أخضر', price: '3 ر.س' },
                { name: 'شاي بالنعناع', price: '4 ر.س' }, { name: 'شاي كرك', price: '5 ر.س' }
            ],
            sweets: [
                { name: 'بان كيك', price: '8 ر.س' }, { name: 'كريب نوتيلا', price: '8 ر.س' },
                { name: 'كوكيز', price: '6 ر.س' }, { name: 'تشيز كيك', price: '10 ر.س' },
                { name: 'وافل', price: '9 ر.س' }
            ]
        };

        function loadMenu(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const container = document.getElementById('menuItems');
            const header = document.getElementById('menuHeader');
            container.innerHTML = '';
            
            // تغيير صورة البانر عند اختيار المشروبات الباردة
            if(cat === 'cold') {
                header.style.backgroundImage = "url('https://i.ibb.co/bgSWNV7f/360-F-956310683-Nj-FOvi-M9-PPRoxku-Sm-HNPxif3k-Qs9am-AH.jpg')";
            } else {
                header.style.backgroundImage = "url('https://images.unsplash.com/photo-1447933601403-0c6688de566e?q=80&w=1000')";
            }

            data[cat].forEach(item => {
                container.innerHTML += `
                    <div class="menu-item">
                        <div class="item-info">
                            <div class="item-thumbnail"></div>
                            <h3>${item.name}</h3>
                        </div>
                        <div class="price-container">${item.price}</div>
                    </div>`;
            });
        }
        // تحميل البداية
        loadMenu('hot', document.querySelector('.category-btn'));
    </script>
</body>
</html>
