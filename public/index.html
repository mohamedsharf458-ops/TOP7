    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; margin: 0; }
        .menu-header { height: 220px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: white; transition: 0.5s; position: relative; }
        .overlay { position: absolute; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .categories { display: flex; justify-content: center; gap: 8px; padding: 15px; overflow-x: auto; background: white; }
        .btn { padding: 8px 15px; border: 1px solid #e2e8f0; border-radius: 20px; font-weight: 700; cursor: pointer; background: white; white-space: nowrap; }
        .btn.active { background: #1e1b4b; color: white; border-color: #1e1b4b; }
        .menu-list { max-width: 500px; margin: auto; padding: 10px; display: grid; gap: 10px; }
        .item { background: white; padding: 10px; border-radius: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; background: #f1f5f9; }
        .info { flex-grow: 1; }
        .name { font-weight: 700; display: block; font-size: 15px; }
        .price { color: #b45309; font-weight: 800; font-size: 14px; }
    </style>
</head>

        <h1 style="position: relative; z-index: 1;">TOP 7 COFFEE</h1>

        function show(cat, btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const list = document.getElementById('list');
            const header = document.getElementById('header');
            list.innerHTML = '';
            header.style.backgroundImage = cat === 'cold' ? "url('https://i.ibb.co/bgSWNV7f/360-F-956310683-Nj-FOvi-M9-PPRoxku-Sm-HNPxif3k-Qs9am-AH.jpg')" : "url('https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=800')";
            data[cat].forEach(item => {
                list.innerHTML += `<div class="item"><img src="${item.i}"><div class="info"><span class="name">${item.n}</span><span class="price">${item.p} ر.س</span></div></div>`;
            });
        }
